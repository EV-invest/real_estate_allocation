cargo-features = ["codegen-backend"]

[workspace]
members = ["real_estate_allocation", "real_estate_allocation_*"]
resolver = "3"

[workspace.lints.clippy]
float_cmp = "allow"
len_zero = "allow"
undocumented_unsafe_blocks = "warn"
tabs_in_doc_comments = "allow"
doc_lazy_continuation = "allow"
get_first = "allow"
get_last_with_len = "allow"
manual_is_multiple_of = "allow"

[workspace.lints.rust]
unused_features = "allow"

[workspace.dependencies]
clap = { version = "^4.5.4", features = ["derive"] }
color-eyre = "^0.6.5"
derive-new = "^0"
miette = { version = "^7.6.0", features = ["fancy", "serde", "syntect-highlighter"] }
real_estate_allocation_macros = { path = "real_estate_allocation_macros" }
v_utils = { version = "^2.15.0", features = ["io", "macros", "cli"] }

# microfrontend stack — pinned to the exact revs `site` verified against.
ev = { git = "https://github.com/EV-invest/lib.git", rev = "4cb3b1abc5f9ff3b5db8494aa687a44d995ec9cc", default-features = false }
dioxus = { version = "0.7" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jiff = { version = "0.2", features = ["serde"] }
uuid = { version = "1", features = ["serde", "v4"] }
sqlx = { version = "0.9.0", default-features = false, features = ["runtime-tokio", "sqlite", "macros"] }
async-trait = "0.1.89"
thiserror = "2.0.18"
tokio = { version = "1", features = ["full"] }
getrandom = { version = "0.3", features = ["wasm_js"] }
wasm-bindgen = "=0.2.118"
